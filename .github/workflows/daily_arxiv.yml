name: Daily Arxiv Update

on:
  schedule:
    - cron: '0 0 * * *' # 08:00 AM UTC+8
  workflow_dispatch: # Allow manual trigger

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Fetch and Summarize
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARXIV_KEYWORDS: ${{ vars.ARXIV_KEYWORDS || '' }}
          ARXIV_CATEGORIES: ${{ vars.ARXIV_CATEGORIES || '' }}
          ARXIV_MAX_DAYS: ${{ vars.ARXIV_MAX_DAYS || '7' }}
          ARXIV_MAX_PAPERS_PER_RUN: ${{ vars.ARXIV_MAX_PAPERS_PER_RUN || '40' }}
          ARXIV_BACKFILL_LIMIT: ${{ vars.ARXIV_BACKFILL_LIMIT || '20' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
        run: |
          python scripts/fetch_and_summarize.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data.json
          git commit -m "chore: daily arxiv update [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push
