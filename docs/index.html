<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Arxiv CV/AI Briefing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .paper-card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">Daily Arxiv CV/AI Briefing</h1>
            <div class="text-sm text-gray-500" id="update-time"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div id="content" class="space-y-12">
            <!-- Papers will be injected here -->
            <div class="flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t mt-20">
        <div class="max-w-5xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
            Powered by DeepSeek & GitHub Actions | Papers from Arxiv
        </div>
    </footer>

    <script>
        async function loadPapers() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                renderPapers(data);
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="bg-red-50 text-red-700 p-4 rounded-lg">
                        加载数据失败，请稍后再试。
                    </div>
                `;
            }
        }

        function renderPapers(papers) {
            const container = document.getElementById('content');
            if (papers.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-gray-500 text-lg">暂无近七天的相关论文。</div>';
                return;
            }

            // Group by date
            const grouped = papers.reduce((acc, paper) => {
                const date = paper.published;
                if (!acc[date]) acc[date] = [];
                acc[date].push(paper);
                return acc;
            }, {});

            const dates = Object.keys(grouped).sort().reverse();
            
            container.innerHTML = dates.map(date => `
                <section>
                    <h2 class="text-xl font-bold text-gray-800 border-l-4 border-blue-500 pl-4 mb-6">${date}</h2>
                    <div class="grid gap-6">
                        ${grouped[date].map(paper => `
                            <div class="paper-card bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <a href="${paper.link}" target="_blank" class="text-lg font-semibold text-blue-600 hover:text-blue-800 leading-tight block mb-2">
                                    ${paper.title}
                                </a>
                                <p class="text-sm text-gray-600 mb-3">${paper.authors.join(', ')}</p>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${paper.tags.map(tag => `
                                        <span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs font-medium rounded-md">${tag}</span>
                                    `).join('')}
                                </div>
                                <div class="bg-gray-50 p-4 rounded-lg border-l-4 border-gray-200">
                                    <p class="text-gray-700 text-sm leading-relaxed">
                                        <span class="font-bold text-gray-900">TL;DR:</span> ${paper.tldr}
                                    </p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        loadPapers();
    </script>
</body>
</html>
