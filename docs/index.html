<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Arxiv CV/AI Briefing</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.7.0/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"SF Pro Rounded"', '"LXGW WenKai Screen"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif']
                    },
                    colors: {
                        claude: {
                            bg: '#F4F1EA',
                            surface: '#FAF9F5',
                            card: '#FFFFFF',
                            border: '#E7E2D4',
                            muted: '#7A7566',
                            text: '#3B3A36',
                            heading: '#2A2B2A',
                            accent: '#C96442',
                            accentSoft: '#F5E4DA',
                            accentDark: '#8F3E23',
                            gold: '#B58A3D'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --claude-bg: #F4F1EA;
            --claude-surface: #FAF9F5;
            --claude-card: #FFFFFF;
            --claude-border: #E7E2D4;
            --claude-muted: #7A7566;
            --claude-text: #3B3A36;
            --claude-heading: #2A2B2A;
            --claude-accent: #C96442;
            --claude-accent-soft: #F5E4DA;
            --claude-accent-dark: #8F3E23;
        }

        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        body {
            font-family: 'SF Pro Rounded', 'LXGW WenKai Screen', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', sans-serif;
            background-color: var(--claude-bg);
            color: var(--claude-text);
            font-feature-settings: 'cv02', 'cv03', 'cv11';
        }

        :lang(zh), :lang(zh-CN), [lang="zh"], [lang="zh-CN"],
        body { font-family: 'SF Pro Rounded', 'LXGW WenKai Screen', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }

        .paper-card {
            background-color: var(--claude-card);
            border: 1px solid var(--claude-border);
            border-radius: 14px;
            transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }
        .paper-card:hover {
            box-shadow: 0 8px 28px -12px rgba(91, 60, 40, 0.18);
            transform: translateY(-1px);
            border-color: #D7CFBC;
        }
        .priority-card { border-left: 3px solid var(--claude-accent); }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            font-size: 11.5px;
            font-weight: 500;
            border-radius: 999px;
            background-color: var(--claude-accent-soft);
            color: var(--claude-accent-dark);
            letter-spacing: 0.2px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            font-size: 12.5px;
            font-weight: 500;
            border-radius: 999px;
            background-color: var(--claude-card);
            color: var(--claude-muted);
            border: 1px solid var(--claude-border);
            transition: background-color 0.15s, color 0.15s, border-color 0.15s;
            cursor: pointer;
            white-space: nowrap;
        }
        .chip:hover { background-color: #F2EEE2; color: var(--claude-text); }
        .chip.active {
            background-color: var(--claude-accent);
            color: #FFFFFF;
            border-color: var(--claude-accent);
        }

        .tab-btn {
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            color: var(--claude-muted);
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .tab-btn:hover { color: var(--claude-text); }
        .tab-btn.active { color: var(--claude-accent); border-bottom-color: var(--claude-accent); }

        /* 详情弹窗 */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background-color: rgba(42, 43, 42, 0.45);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 50;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 16px;
            overflow-y: auto;
        }
        .modal-backdrop.show { display: flex; }
        .modal-card {
            background-color: var(--claude-surface);
            border: 1px solid var(--claude-border);
            border-radius: 18px;
            width: 100%;
            max-width: 780px;
            max-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 32px 80px -24px rgba(30, 26, 20, 0.35);
            overflow: hidden;
            animation: modalIn 0.18s ease-out;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 22px 26px 16px;
            border-bottom: 1px solid var(--claude-border);
            background-color: var(--claude-card);
        }
        .modal-body {
            padding: 22px 26px 28px;
            overflow-y: auto;
            color: var(--claude-text);
            line-height: 1.7;
        }
        .modal-footer {
            padding: 14px 26px 18px;
            border-top: 1px solid var(--claude-border);
            background-color: var(--claude-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .close-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--claude-muted);
            background-color: transparent;
            border: 1px solid transparent;
            transition: background-color 0.15s, color 0.15s, border-color 0.15s;
            cursor: pointer;
        }
        .close-btn:hover { background-color: #F2EEE2; color: var(--claude-text); border-color: var(--claude-border); }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--claude-accent);
            margin-bottom: 6px;
        }
        .section-block { margin-top: 18px; }
        .section-block:first-child { margin-top: 0; }
        .section-block p { color: var(--claude-text); font-size: 14.5px; }

        .meta-row {
            display: grid;
            grid-template-columns: 92px 1fr;
            column-gap: 14px;
            row-gap: 8px;
            font-size: 13.5px;
        }
        .meta-row dt {
            color: var(--claude-muted);
            font-weight: 500;
            letter-spacing: 0.04em;
        }
        .meta-row dd { color: var(--claude-text); }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            background-color: var(--claude-accent);
            color: #FFFFFF;
            transition: background-color 0.15s, transform 0.15s;
        }
        .link-btn:hover { background-color: var(--claude-accent-dark); transform: translateY(-1px); }

        .ghost-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            background-color: var(--claude-card);
            color: var(--claude-text);
            border: 1px solid var(--claude-border);
            transition: background-color 0.15s, color 0.15s;
            cursor: pointer;
        }
        .ghost-btn:hover { background-color: #F2EEE2; color: var(--claude-heading); }

        /* 分页按钮 */
        .page-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            background-color: var(--claude-card);
            color: var(--claude-muted);
            border: 1px solid var(--claude-border);
            transition: background-color 0.15s, color 0.15s;
        }
        .page-btn:hover { background-color: #F2EEE2; color: var(--claude-text); }
        .page-btn.active { background-color: var(--claude-accent); color: #FFFFFF; border-color: var(--claude-accent); }

        /* 滚动条 */
        .modal-body::-webkit-scrollbar { width: 8px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: #DDD4BF; border-radius: 4px; }
        .modal-body::-webkit-scrollbar-thumb:hover { background: #CFC4AB; }

        /* 日期选项条 */
        #date-bar::-webkit-scrollbar { height: 0; }
        #date-bar { scrollbar-width: none; }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(201, 100, 66, 0.25);
            border-top-color: var(--claude-accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

<header class="sticky top-0 z-20" style="background-color: rgba(250, 249, 245, 0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--claude-border);">
    <div class="max-w-5xl mx-auto px-6 pt-5 pb-0">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-2">
            <div>
                <p class="text-xs font-semibold tracking-[0.2em] uppercase" style="color: var(--claude-accent);">Arxiv Daily Briefing</p>
                <h1 class="text-2xl font-bold tracking-tight" style="color: var(--claude-heading);">Computer Vision &amp; AI</h1>
            </div>
            <p class="text-sm" id="update-time" style="color: var(--claude-muted);"></p>
        </div>
        <nav>
            <div class="flex gap-0 mt-4" id="tab-bar">
                <button class="tab-btn active" data-tab="all">All</button>
                <button class="tab-btn" data-tab="cs.CV">Computer Vision</button>
                <button class="tab-btn" data-tab="cs.AI">Artificial Intelligence</button>
            </div>
        </nav>
    </div>
    <div class="max-w-5xl mx-auto px-6 py-2.5 flex items-center gap-2 overflow-x-auto" id="date-bar"></div>
</header>

<main class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center gap-3 mb-8 text-sm" style="color: var(--claude-muted);">
        <span class="inline-flex items-center gap-1.5">
            <span class="w-2.5 h-2.5 rounded-full inline-block" style="background-color: var(--claude-accent);"></span>
            Priority topic
        </span>
        <span style="color: var(--claude-border);">|</span>
        <span id="paper-count"></span>
    </div>

    <div id="content" class="space-y-12">
        <div class="flex justify-center items-center py-32">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<footer style="border-top: 1px solid var(--claude-border); margin-top: 64px;">
    <div class="max-w-5xl mx-auto px-6 py-10 text-center text-sm" style="color: var(--claude-muted);">
        <p>Powered by DeepSeek &amp; GitHub Actions &middot; Papers from
            <a href="https://arxiv.org" class="underline underline-offset-2" style="color: var(--claude-accent);">Arxiv</a>
        </p>
    </div>
</footer>

<div class="modal-backdrop" id="paper-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card" role="document">
        <div class="modal-header">
            <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2 mb-1.5">
                    <span id="modal-cat-pill" class="tag-pill" style="background-color: var(--claude-accent-soft); color: var(--claude-accent-dark);"></span>
                    <span id="modal-priority-pill" class="tag-pill" style="display: none; background-color: #FFF4D9; color: #8A5A12;">Priority</span>
                </div>
                <h2 id="modal-title" class="text-xl font-semibold leading-snug" style="color: var(--claude-heading);"></h2>
            </div>
            <button class="close-btn" id="modal-close" aria-label="Close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
            <span id="modal-position" class="text-xs" style="color: var(--claude-muted);"></span>
            <div class="flex items-center gap-2">
                <button class="ghost-btn" id="modal-prev" title="Previous paper (←)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    <span>Prev</span>
                </button>
                <button class="ghost-btn" id="modal-next" title="Next paper (→)">
                    <span>Next</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
                <a class="link-btn" id="modal-link" href="#" target="_blank" rel="noopener">
                    <span>Open arXiv</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
const PRIORITY_KEYWORDS = [
    "SLAM", "3D Reconstruction", "3D重建", "Visual Odometry",
    "VIO", "Visual Inertial Odometry", "VO",
    "Camera Localization", "Visual Localization",
    "Structure from Motion", "SfM", "Visual SLAM",
    "视觉定位", "相机定位", "视觉惯性", "三维重建",
    "视觉里程计", "视觉惯性里程计"
];

function isPriority(paper) {
    const text = ((paper.title || '') + ' ' + (paper.tags || []).join(' ')).toLowerCase();
    return PRIORITY_KEYWORDS.some(kw => text.includes(kw.toLowerCase()));
}

function categoryLabel(cat) {
    if (cat === 'cs.CV') return 'Computer Vision';
    if (cat === 'cs.AI') return 'Artificial Intelligence';
    return 'Unknown';
}

function categoryShort(cat) {
    if (cat === 'cs.CV') return 'CV';
    if (cat === 'cs.AI') return 'AI';
    return '?';
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function renderTags(tags) {
    return (tags || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join(' ');
}

function renderPaper(paper, index) {
    const priority = isPriority(paper);
    const cat = paper.category || 'Unknown';
    const catShort = categoryShort(cat);

    return `
    <article class="paper-card p-6 ${priority ? 'priority-card' : ''}" data-index="${index}">
        <div class="flex items-start gap-3 mb-3">
            ${priority ? '<span class="shrink-0 mt-1 w-2 h-2 rounded-full" style="background-color: var(--claude-accent);" title="Priority topic"></span>' : ''}
            <div class="min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-[11px] font-semibold tracking-wider uppercase" style="color: var(--claude-muted);">${catShort}</span>
                    ${priority ? '<span class="text-[11px] font-semibold" style="color: var(--claude-accent);">Priority</span>' : ''}
                </div>
                <h3 class="text-lg font-semibold leading-snug" style="color: var(--claude-heading);">${escapeHtml(paper.title)}</h3>
                <p class="text-sm mt-1.5" style="color: var(--claude-muted);">${escapeHtml((paper.authors || []).join(', '))}</p>
            </div>
        </div>
        <div class="flex flex-wrap gap-1.5 mb-4">
            ${renderTags(paper.tags)}
        </div>
        <div class="rounded-lg px-4 py-3" style="background-color: #F7F3E8; border-left: 2px solid ${priority ? 'var(--claude-accent)' : 'var(--claude-border)'};">
            <p class="text-sm leading-relaxed" style="color: var(--claude-text);">
                <span class="font-semibold" style="color: var(--claude-heading);">TL;DR</span>
                <span class="ml-1">${escapeHtml(paper.tldr || '摘要未提供相关信息')}</span>
            </p>
        </div>
    </article>`;
}

/* ---------- Modal ---------- */

function openModal(index) {
    const flat = window.__flat || [];
    if (!flat.length) return;
    if (index < 0) index = 0;
    if (index >= flat.length) index = flat.length - 1;
    window.__modalIndex = index;
    renderModal();
    const modal = document.getElementById('paper-modal');
    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('paper-modal').classList.remove('show');
    document.body.style.overflow = '';
    window.__modalIndex = -1;
}

function renderModal() {
    const flat = window.__flat || [];
    const idx = window.__modalIndex;
    if (idx < 0 || idx >= flat.length) return;
    const paper = flat[idx];
    const priority = isPriority(paper);
    const cat = paper.category || 'Unknown';

    document.getElementById('modal-title').textContent = paper.title || '';
    const catPill = document.getElementById('modal-cat-pill');
    catPill.textContent = categoryLabel(cat);
    const priorityPill = document.getElementById('modal-priority-pill');
    priorityPill.style.display = priority ? 'inline-flex' : 'none';

    const link = document.getElementById('modal-link');
    link.href = paper.link || paper.id || '#';

    document.getElementById('modal-position').textContent = `${idx + 1} / ${flat.length}`;

    const authors = (paper.authors || []).join(', ') || '摘要未提供相关信息';
    const fields = [
        { label: 'TL;DR', value: paper.tldr || '摘要未提供相关信息' },
        { label: 'Motivation', value: paper.motivation || '摘要未提供相关信息' },
        { label: 'Method', value: paper.method || '摘要未提供相关信息' },
        { label: 'Result', value: paper.result || '摘要未提供相关信息' },
        { label: 'Conclusion', value: paper.conclusion || '摘要未提供相关信息' },
        { label: 'Abstract', value: paper.abstract || '摘要未提供相关信息' }
    ];

    const sectionsHtml = fields.map(f => `
        <section class="section-block">
            <div class="section-label">${f.label}</div>
            <p style="white-space: pre-wrap;">${escapeHtml(f.value)}</p>
        </section>`).join('');

    const metaHtml = `
        <dl class="meta-row">
            <dt>Authors</dt><dd>${escapeHtml(authors)}</dd>
            <dt>Categories</dt><dd>${escapeHtml(categoryLabel(cat))} <span style="color: var(--claude-muted);">(${escapeHtml(cat)})</span></dd>
            <dt>Date</dt><dd>${escapeHtml(paper.published || '')}</dd>
        </dl>
        ${(paper.tags && paper.tags.length) ? `<div class="flex flex-wrap gap-1.5 mt-4">${renderTags(paper.tags)}</div>` : ''}
    `;

    document.getElementById('modal-body').innerHTML = metaHtml + sectionsHtml;
}

function bindModal() {
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('paper-modal').addEventListener('click', (e) => {
        if (e.target.id === 'paper-modal') closeModal();
    });
    document.getElementById('modal-prev').addEventListener('click', () => {
        if (window.__modalIndex > 0) openModal(window.__modalIndex - 1);
    });
    document.getElementById('modal-next').addEventListener('click', () => {
        const flat = window.__flat || [];
        if (window.__modalIndex < flat.length - 1) openModal(window.__modalIndex + 1);
    });
    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('paper-modal');
        if (!modal.classList.contains('show')) return;
        if (e.key === 'Escape') closeModal();
        else if (e.key === 'ArrowLeft' && window.__modalIndex > 0) openModal(window.__modalIndex - 1);
        else if (e.key === 'ArrowRight' && window.__modalIndex < (window.__flat || []).length - 1) openModal(window.__modalIndex + 1);
    });
}

/* ---------- Load & Render ---------- */

async function loadPapers() {
    try {
        const resp = await fetch('data.json', { cache: 'no-cache' });
        const papers = await resp.json();
        window.__papers = papers;
        window.__activeTab = 'all';
        window.__activeDate = 'all';
        setupTabs();
        bindModal();
        renderDateBar(papers, 'all');
        render(papers, 'all', 'all');
    } catch (e) {
        document.getElementById('content').innerHTML =
            '<div class="p-4 rounded-lg text-sm" style="background-color: #FCEAE2; color: #7A2F17; border: 1px solid #F3CEBF;">Failed to load data. Please try again later.</div>';
    }
}

function setupTabs() {
    const buttons = document.querySelectorAll('#tab-bar .tab-btn');
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            window.__activeTab = tab;
            window.__activeDate = 'all';
            renderDateBar(window.__papers, tab);
            render(window.__papers, tab, 'all');
        });
    });
}

function renderDateBar(papers, tab) {
    const bar = document.getElementById('date-bar');
    let filtered = papers;
    if (tab === 'cs.CV') filtered = papers.filter(p => p.category === 'cs.CV');
    else if (tab === 'cs.AI') filtered = papers.filter(p => p.category === 'cs.AI');

    const dates = [...new Set(filtered.map(p => p.published))].sort().reverse();
    if (dates.length <= 1) { bar.innerHTML = ''; return; }

    let html = `<button class="chip ${window.__activeDate === 'all' ? 'active' : ''}" data-date="all">All dates</button>`;
    for (const d of dates) {
        const count = filtered.filter(p => p.published === d).length;
        const active = d === window.__activeDate ? 'active' : '';
        html += `<button class="chip ${active}" data-date="${d}">${d} <span class="ml-1 opacity-70">${count}</span></button>`;
    }
    bar.innerHTML = html;

    bar.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
            window.__activeDate = btn.dataset.date;
            renderDateBar(window.__papers, window.__activeTab);
            render(window.__papers, window.__activeTab, window.__activeDate);
        });
    });
}

const PAGE_SIZE = 10;

function buildSortedList(papers) {
    const grouped = papers.reduce((acc, p) => {
        const d = p.published;
        if (!acc[d]) acc[d] = [];
        acc[d].push(p);
        return acc;
    }, {});
    const dates = Object.keys(grouped).sort().reverse();
    const flat = [];
    for (const d of dates) {
        const priority = grouped[d].filter(isPriority);
        const regular = grouped[d].filter(p => !isPriority(p));
        flat.push(...priority, ...regular);
    }
    return flat;
}

function renderPage(flat, page) {
    const totalPages = Math.max(1, Math.ceil(flat.length / PAGE_SIZE));
    const start = (page - 1) * PAGE_SIZE;
    const slice = flat.slice(start, start + PAGE_SIZE);

    let html = '';
    let lastDate = '';
    for (let i = 0; i < slice.length; i++) {
        const paper = slice[i];
        const globalIndex = start + i;
        if (paper.published !== lastDate) {
            lastDate = paper.published;
            const inPage = flat.filter(p => p.published === lastDate);
            const priorityInDate = inPage.filter(isPriority).length;
            const dateLabel = priorityInDate > 0
                ? `${lastDate} <span class="text-sm font-normal ml-2" style="color: var(--claude-accent);">${priorityInDate} priority</span>`
                : lastDate;
            html += `<h2 class="text-lg font-semibold mb-5 pb-2" style="color: var(--claude-heading); border-bottom: 1px solid var(--claude-border);">${dateLabel}</h2>`;
        }
        html += renderPaper(paper, globalIndex);
    }

    return { html, totalPages };
}

function renderPagination(flat, page, totalPages) {
    if (totalPages <= 1) return '';
    let btns = '';
    for (let i = 1; i <= totalPages; i++) {
        const active = i === page ? 'active' : '';
        btns += `<button class="page-btn ${active}" data-page="${i}">${i}</button>`;
    }
    const prevDisabled = page <= 1 ? 'opacity-40 pointer-events-none' : '';
    const nextDisabled = page >= totalPages ? 'opacity-40 pointer-events-none' : '';
    return `
    <div class="flex items-center justify-center gap-1.5 mt-10 pt-6" style="border-top: 1px solid var(--claude-border);">
        <button class="page-btn ${prevDisabled}" data-page="${page - 1}">&larr;</button>
        ${btns}
        <button class="page-btn ${nextDisabled}" data-page="${page + 1}">&rarr;</button>
    </div>`;
}

function bindCardClicks() {
    document.querySelectorAll('.paper-card').forEach(card => {
        card.addEventListener('click', () => {
            const idx = parseInt(card.dataset.index, 10);
            if (!Number.isNaN(idx)) openModal(idx);
        });
    });
}

function bindPagination(flat) {
    document.querySelectorAll('.page-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const p = parseInt(btn.dataset.page);
            if (p < 1 || p > Math.ceil(flat.length / PAGE_SIZE)) return;
            window.__page = p;
            const { html, totalPages } = renderPage(flat, p);
            document.getElementById('content').innerHTML =
                '<div class="grid gap-4">' + html + '</div>' +
                renderPagination(flat, p, totalPages);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            bindPagination(flat);
            bindCardClicks();
        });
    });
}

function render(papers, tab, date) {
    const container = document.getElementById('content');
    const countEl = document.getElementById('paper-count');
    const timeEl = document.getElementById('update-time');

    let filtered = papers;
    if (tab === 'cs.CV') filtered = filtered.filter(p => p.category === 'cs.CV');
    else if (tab === 'cs.AI') filtered = filtered.filter(p => p.category === 'cs.AI');
    if (date && date !== 'all') filtered = filtered.filter(p => p.published === date);

    countEl.textContent = `${filtered.length} papers`;

    if (filtered.length > 0) {
        const latest = filtered.reduce((max, p) => p.published > max ? p.published : max, '');
        timeEl.textContent = `Updated ${latest}`;
    } else {
        timeEl.textContent = '';
    }

    if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center py-20 text-sm" style="color: var(--claude-muted);">No papers match the selected filters.</div>`;
        window.__flat = [];
        return;
    }

    const flat = buildSortedList(filtered);
    window.__flat = flat;
    window.__page = 1;
    const { html, totalPages } = renderPage(flat, 1);
    container.innerHTML =
        '<div class="grid gap-4">' + html + '</div>' +
        renderPagination(flat, 1, totalPages);
    bindPagination(flat);
    bindCardClicks();
}

loadPapers();
</script>
</body>
