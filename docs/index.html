<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Arxiv CV/AI Briefing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                    colors: {
                        accent: { DEFAULT: '#d97706', light: '#fef3c7', lighter: '#fffbeb', dark: '#92400e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-feature-settings: 'cv02','cv03','cv04','cv11'; }
        .paper-card { transition: box-shadow 0.2s ease, transform 0.2s ease; }
        .paper-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.08); transform: translateY(-1px); }
        .priority-card { border-left: 3px solid #d97706; }
        .tab-btn { transition: color 0.15s, border-color 0.15s; }
        .tag-pill { transition: background 0.15s; }
        .tag-pill:hover { background: #fde68a; }
    </style>
</head>
<body class="text-gray-900 antialiased min-h-screen" style="background-color: #FAF9F5;">

<header class="sticky top-0 z-10 bg-white/95 backdrop-blur-sm border-b border-gray-100">
    <div class="max-w-4xl mx-auto px-6 pt-5 pb-0">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-2">
            <div>
                <p class="text-xs font-medium tracking-widest text-accent uppercase mb-1">Arxiv Daily Briefing</p>
                <h1 class="text-2xl font-bold tracking-tight text-gray-900">Computer Vision &amp; AI</h1>
            </div>
            <p class="text-sm text-gray-400" id="update-time"></p>
        </div>
        <nav>
            <div class="flex gap-0 mt-4" id="tab-bar">
                <button class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-accent text-accent" data-tab="all">All</button>
                <button class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-tab="cs.CV">Computer Vision</button>
                <button class="tab-btn px-5 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-tab="cs.AI">Artificial Intelligence</button>
            </div>
        </nav>
    </div>
    <div class="max-w-4xl mx-auto px-6 py-2.5 flex items-center gap-2 overflow-x-auto" id="date-bar"></div>
</header>

<main class="max-w-4xl mx-auto px-6 py-10">
    <div class="flex items-center gap-3 mb-8 text-sm text-gray-500">
        <span class="inline-flex items-center gap-1.5">
            <span class="w-2.5 h-2.5 rounded-full bg-accent inline-block"></span>
            Priority topic
        </span>
        <span class="text-gray-300">|</span>
        <span id="paper-count"></span>
    </div>

    <div id="content" class="space-y-12">
        <div class="flex justify-center items-center py-32">
            <div class="w-8 h-8 border-2 border-accent/30 border-t-accent rounded-full animate-spin"></div>
        </div>
    </div>
</main>

<footer class="border-t border-gray-100 mt-16">
    <div class="max-w-4xl mx-auto px-6 py-10 text-center text-sm text-gray-400">
        <p>Powered by DeepSeek &amp; GitHub Actions &middot; Papers from <a href="https://arxiv.org" class="text-gray-500 hover:text-accent underline underline-offset-2">Arxiv</a></p>
    </div>
</footer>

<script>
const PRIORITY_KEYWORDS = [
    "SLAM", "3D Reconstruction", "3D重建", "Visual Odometry",
    "VIO", "Visual Inertial Odometry", "VO",
    "Camera Localization", "Visual Localization",
    "Structure from Motion", "SfM", "Visual SLAM",
    "视觉定位", "相机定位", "视觉惯性", "三维重建",
    "视觉里程计", "视觉惯性里程计"
];

function isPriority(paper) {
    const text = ((paper.title || '') + ' ' + (paper.tags || []).join(' ')).toLowerCase();
    return PRIORITY_KEYWORDS.some(kw => text.includes(kw.toLowerCase()));
}

function categoryLabel(cat) {
    if (cat === 'cs.CV') return 'Computer Vision';
    if (cat === 'cs.AI') return 'Artificial Intelligence';
    return 'Unknown';
}

function categoryShort(cat) {
    if (cat === 'cs.CV') return 'CV';
    if (cat === 'cs.AI') return 'AI';
    return '?';
}

function renderTags(tags) {
    return tags.map(t => `<span class="tag-pill inline-block px-2.5 py-0.5 bg-accent-lighter text-accent-dark text-xs font-medium rounded-full">${t}</span>`).join('');
}

function renderPaper(paper) {
    const priority = isPriority(paper);
    const cat = paper.category || 'Unknown';
    const catShort = categoryShort(cat);
    const catFull = categoryLabel(cat);

    return `
    <div class="paper-card bg-white rounded-xl border border-gray-100 p-6 ${priority ? 'priority-card' : ''}">
        <div class="flex items-start gap-3 mb-3">
            ${priority ? '<span class="shrink-0 mt-1 w-2 h-2 rounded-full bg-accent" title="Priority topic: SLAM / 3D / VO / VIO / Localization"></span>' : ''}
            <div class="min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">${catShort}</span>
                    ${priority ? '<span class="text-xs font-medium text-accent">Priority</span>' : ''}
                </div>
                <a href="${paper.link}" target="_blank" rel="noopener" class="text-lg font-semibold text-gray-900 hover:text-accent leading-snug">
                    ${paper.title}
                </a>
                <p class="text-sm text-gray-500 mt-1.5">${paper.authors.join(', ')}</p>
            </div>
        </div>
        <div class="flex flex-wrap gap-1.5 mb-4">
            ${renderTags(paper.tags)}
        </div>
        <div class="bg-gray-50/70 rounded-lg px-4 py-3 border-l-2 ${priority ? 'border-accent/40' : 'border-gray-200'}">
            <p class="text-sm text-gray-700 leading-relaxed">
                <span class="font-semibold text-gray-900">TL;DR</span> ${paper.tldr}
            </p>
        </div>
    </div>`;
}

async function loadPapers() {
    try {
        const resp = await fetch('data.json');
        const papers = await resp.json();
        window.__papers = papers;
        window.__activeTab = 'all';
        window.__activeDate = 'all';
        setupTabs();
        renderDateBar(papers, 'all');
        render(papers, 'all', 'all');
    } catch (e) {
        document.getElementById('content').innerHTML =
            '<div class="bg-red-50 text-red-700 p-4 rounded-lg text-sm">Failed to load data. Please try again later.</div>';
    }
}

function setupTabs() {
    const buttons = document.querySelectorAll('#tab-bar .tab-btn');
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => { b.classList.remove('border-accent','text-accent'); b.classList.add('border-transparent','text-gray-500'); });
            btn.classList.add('border-accent','text-accent');
            btn.classList.remove('border-transparent','text-gray-500');
            const tab = btn.dataset.tab;
            window.__activeTab = tab;
            window.__activeDate = 'all';
            renderDateBar(window.__papers, tab);
            render(window.__papers, tab, 'all');
        });
    });
}

function renderDateBar(papers, tab) {
    const bar = document.getElementById('date-bar');
    let filtered = papers;
    if (tab === 'cs.CV') filtered = papers.filter(p => p.category === 'cs.CV');
    else if (tab === 'cs.AI') filtered = papers.filter(p => p.category === 'cs.AI');

    const dates = [...new Set(filtered.map(p => p.published))].sort().reverse();
    if (dates.length <= 1) { bar.innerHTML = ''; return; }

    const allActive = window.__activeDate === 'all'
        ? 'bg-accent text-white'
        : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200';
    let html = `<button class="date-btn shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium ${allActive} transition-colors" data-date="all">All dates</button>`;

    for (const d of dates) {
        const count = filtered.filter(p => p.published === d).length;
        const active = d === window.__activeDate
            ? 'bg-accent text-white'
            : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200';
        html += `<button class="date-btn shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium ${active} transition-colors" data-date="${d}">${d} <span class="opacity-60">${count}</span></button>`;
    }
    bar.innerHTML = html;

    bar.querySelectorAll('.date-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            window.__activeDate = btn.dataset.date;
            renderDateBar(window.__papers, window.__activeTab);
            render(window.__papers, window.__activeTab, window.__activeDate);
        });
    });
}

const PAGE_SIZE = 7;

function buildSortedList(papers) {
    const grouped = papers.reduce((acc, p) => {
        const d = p.published;
        if (!acc[d]) acc[d] = [];
        acc[d].push(p);
        return acc;
    }, {});
    const dates = Object.keys(grouped).sort().reverse();
    const flat = [];
    for (const d of dates) {
        const priority = grouped[d].filter(isPriority);
        const regular = grouped[d].filter(p => !isPriority(p));
        flat.push(...priority, ...regular);
    }
    return flat;
}

function renderPage(flat, page) {
    const totalPages = Math.ceil(flat.length / PAGE_SIZE);
    const start = (page - 1) * PAGE_SIZE;
    const slice = flat.slice(start, start + PAGE_SIZE);

    let html = '';
    let lastDate = '';
    for (const paper of slice) {
        if (paper.published !== lastDate) {
            lastDate = paper.published;
            const inPage = flat.filter(p => p.published === lastDate);
            const priorityInDate = inPage.filter(isPriority).length;
            const dateLabel = priorityInDate > 0
                ? `${lastDate} <span class="text-accent text-sm font-normal ml-2">${priorityInDate} priority</span>`
                : lastDate;
            html += `<h2 class="text-lg font-semibold text-gray-900 mb-5 pb-2 border-b border-gray-100">${dateLabel}</h2>`;
        }
        html += renderPaper(paper);
    }

    return { html, totalPages };
}

function renderPagination(flat, page, totalPages) {
    if (totalPages <= 1) return '';
    let btns = '';
    for (let i = 1; i <= totalPages; i++) {
        const active = i === page
            ? 'bg-accent text-white'
            : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200';
        btns += `<button class="page-btn w-9 h-9 rounded-lg text-sm font-medium ${active} transition-colors" data-page="${i}">${i}</button>`;
    }
    const prevDisabled = page <= 1 ? 'opacity-40 pointer-events-none' : 'hover:bg-gray-100';
    const nextDisabled = page >= totalPages ? 'opacity-40 pointer-events-none' : 'hover:bg-gray-100';
    return `
    <div class="flex items-center justify-center gap-1.5 mt-10 pt-6 border-t border-gray-100">
        <button class="page-btn w-9 h-9 rounded-lg text-sm font-medium bg-white border border-gray-200 text-gray-600 ${prevDisabled} transition-colors" data-page="${page - 1}">&larr;</button>
        ${btns}
        <button class="page-btn w-9 h-9 rounded-lg text-sm font-medium bg-white border border-gray-200 text-gray-600 ${nextDisabled} transition-colors" data-page="${page + 1}">&rarr;</button>
    </div>`;
}

function bindPagination(flat) {
    document.querySelectorAll('.page-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const p = parseInt(btn.dataset.page);
            if (p < 1 || p > Math.ceil(flat.length / PAGE_SIZE)) return;
            window.__page = p;
            const { html, totalPages } = renderPage(flat, p);
            document.getElementById('content').innerHTML =
                '<div class="grid gap-4">' + html + '</div>' +
                renderPagination(flat, p, totalPages);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            bindPagination(flat);
        });
    });
}

function render(papers, tab, date) {
    const container = document.getElementById('content');
    const countEl = document.getElementById('paper-count');
    const timeEl = document.getElementById('update-time');

    let filtered = papers;
    if (tab === 'cs.CV') {
        filtered = filtered.filter(p => p.category === 'cs.CV');
    } else if (tab === 'cs.AI') {
        filtered = filtered.filter(p => p.category === 'cs.AI');
    }
    if (date && date !== 'all') {
        filtered = filtered.filter(p => p.published === date);
    }

    countEl.textContent = `${filtered.length} papers`;

    if (filtered.length > 0) {
        const latest = filtered.reduce((max, p) => p.published > max ? p.published : max, '');
        timeEl.textContent = `Updated ${latest}`;
    }

    if (filtered.length === 0) {
        container.innerHTML = '<div class="text-center py-20 text-gray-400 text-sm">No papers match the selected filters.</div>';
        return;
    }

    const flat = buildSortedList(filtered);
    window.__page = 1;
    const { html, totalPages } = renderPage(flat, 1);
    container.innerHTML =
        '<div class="grid gap-4">' + html + '</div>' +
        renderPagination(flat, 1, totalPages);
    bindPagination(flat);
}

loadPapers();
</script>
</body>
</html>
